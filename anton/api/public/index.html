<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lovable Import Module</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1f2330;
        --border: #2a2f3d;
        --text: #e6e8ee;
        --muted: #8a90a2;
        --accent: #7c5cff;
        --accent-fg: #ffffff;
        --ok-bg: #103021;
        --ok-border: #1f6b46;
        --ok-text: #b8f0d2;
        --err-bg: #2a1417;
        --err-border: #7a2533;
        --err-text: #ffb8c2;
        --radius: 10px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Inter, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 24px;
      }
      h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.01em; }
      p.lede { color: var(--muted); margin: 0 0 32px; }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 12px 18px;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover { background: var(--panel-2); }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-fg);
      }
      button.primary:hover { filter: brightness(1.1); }
      button.big { padding: 16px 22px; font-size: 16px; }
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(8, 10, 14, 0.6);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .modal-bg.open { display: flex; }
      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        width: min(520px, 92vw);
      }
      .modal h2 { margin: 0 0 14px; font-size: 18px; }
      label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
      input[type="text"] {
        width: 100%;
        font: inherit;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      input[type="text"]:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
      .row.right { justify-content: flex-end; }
      .check { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); }
      .panel {
        margin-top: 24px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
      }
      .panel.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); }
      .panel.err { background: var(--err-bg); border-color: var(--err-border); color: var(--err-text); }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.08);
        margin-left: 8px;
      }
      code, .mono { font-family: var(--mono); font-size: 13px; }
      .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 14px; margin: 10px 0; }
      .kv .k { color: var(--muted); }
      .kv .v { word-break: break-all; user-select: all; }
      ul.reasons { margin: 8px 0 0 18px; padding: 0; }
      ul.reasons li { margin: 2px 0; }
      .spinner {
        width: 18px; height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>Lovable Import Module</h1>
      <p class="lede">
        Paste a Lovable project or GitHub repo URL. We pull the source, cache it, and detect whether it's
        a Lovable build.
      </p>

      <button id="open" class="primary big">Connect from Lovable</button>

      <div id="loading" class="panel hidden">
        <span class="spinner"></span>
        <span id="loadingText">Importing&hellip;</span>
      </div>

      <div id="result" class="panel hidden"></div>
    </main>

    <div id="modalBg" class="modal-bg" role="dialog" aria-modal="true">
      <div class="modal">
        <h2>Import a project</h2>
        <label for="url">Paste Lovable URL or GitHub repo URL</label>
        <input id="url" type="text" placeholder="https://lovable.dev/projects/... or https://github.com/owner/repo" />
        <div class="row">
          <label class="check">
            <input id="fresh" type="checkbox" />
            Force fresh fetch (bypass cache)
          </label>
        </div>
        <div class="row right">
          <button id="cancel">Cancel</button>
          <button id="submit" class="primary">Import</button>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const modal = $('modalBg');
      const open = () => { modal.classList.add('open'); $('url').focus(); };
      const close = () => modal.classList.remove('open');

      $('open').addEventListener('click', open);
      $('cancel').addEventListener('click', close);
      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

      $('submit').addEventListener('click', async () => {
        const url = $('url').value.trim();
        if (!url) return;
        const fresh = $('fresh').checked;
        close();
        await runImport(url, fresh);
      });

      $('url').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') $('submit').click();
      });

      async function runImport(url, fresh) {
        const loading = $('loading');
        const result = $('result');
        result.classList.add('hidden');
        result.innerHTML = '';
        loading.classList.remove('hidden');
        $('loadingText').textContent = `Importing ${url}…`;

        try {
          const res = await fetch('/api/import', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ url, fresh }),
          });
          const body = await res.json();
          loading.classList.add('hidden');
          if (res.ok) renderOk(body);
          else renderErr(body);
        } catch (e) {
          loading.classList.add('hidden');
          renderErr({ code: 'NETWORK', error: e.message || 'Network error' });
        }
      }

      function renderOk(r) {
        const cachedBadge = `<span class="badge">Cached: ${r.cached ? 'yes' : 'no'}</span>`;
        const lovableBadge = `<span class="badge">Lovable: ${r.isLovable ? 'yes' : 'no'}</span>`;
        const reasons = (r.detectionReasons || []).map((x) => `<li>${escape(x)}</li>`).join('') ||
          '<li><em>(no signals)</em></li>';
        const result = $('result');
        result.className = 'panel ok';
        result.innerHTML = `
          <div><strong>Import succeeded</strong>${cachedBadge}${lovableBadge}</div>
          <div class="kv">
            <div class="k">workdir</div><div class="v mono">${escape(r.workdir)}</div>
            <div class="k">owner / repo</div><div class="v mono">${escape(r.repoMeta.owner)}/${escape(r.repoMeta.repo)}</div>
            <div class="k">sha</div><div class="v mono">${escape(r.repoMeta.sha || '(unknown)')}</div>
            <div class="k">source</div><div class="v mono">${escape(r.repoMeta.sourceUrl)}</div>
            <div class="k">jobId</div><div class="v mono">${escape(r.jobId)}</div>
          </div>
          <div><strong>Detection reasons</strong></div>
          <ul class="reasons">${reasons}</ul>
        `;
        result.classList.remove('hidden');
      }

      function renderErr(e) {
        const result = $('result');
        result.className = 'panel err';
        const hint = e.code === 'RATE_LIMITED'
          ? '<p>Add <code>GITHUB_TOKEN</code> to your <code>.env</code> file and restart the server. Token: https://github.com/settings/tokens</p>'
          : '';
        result.innerHTML = `
          <div><strong>${escape(e.code || 'ERROR')}</strong></div>
          <p>${escape(e.error || 'Unknown error')}</p>
          ${hint}
        `;
        result.classList.remove('hidden');
      }

      function escape(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }
    </script>
  </body>
</html>
